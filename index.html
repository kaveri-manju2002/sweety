<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web Calculator</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; }
        input, select, button { margin: 5px; padding: 10px; font-size: 16px; }
    </style>
</head>
<body>
    <h2>--- Simple Web Calculator ---</h2>
    <input type="number" id="num1" placeholder="First Number">
    <select id="operator">
        <option value="+">+</option>
        <option value="-">-</option>
        <option value="*">*</option>
        <option value="/">/</option>
    </select>
    <input type="number" id="num2" placeholder="Second Number">
    <button onclick="calculate()">Calculate</button>
    
    <h3 id="result">The result is: </h3>

    <script>
        function calculate() {
            // This is JavaScript, which web browsers understand perfectly
            let num1 = parseFloat(document.getElementById('num1').value);
            let num2 = parseFloat(document.getElementById('num2').value);
            let operator = document.getElementById('operator').value;
            let result = 0;

            if (isNaN(num1) || isNaN(num2)) {
                document.getElementById('result').innerText = "Please enter valid numbers.";
                return;
            }

            switch (operator) {
                case '+': result = num1 + num2; break;
                case '-': result = num1 - num2; break;
                case '*': result = num1 * num2; break;
                case '/': 
                    if (num2 !== 0) {
                        result = num1 / num2; 
                    } else {
                        document.getElementById('result').innerText = "Error! Division by zero.";
                        return;
                    }
                    break;
            }
            document.getElementById('result').innerText = "The result is: " + result.toFixed(2);
        }
    </script>
</body>
</html>
